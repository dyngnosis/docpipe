version: "3.9"

services:
  docpipe:
    build: .
    ports:
      - "3005:3005"
    volumes:
      - docpipe_data:/data
    environment:
      DATABASE_PATH: /data/docpipe.db
      UPLOAD_DIR: /data/uploads
      OUTPUT_DIR: /data/outputs
      SECRET_KEY: change-me-in-production
    restart: unless-stopped

volumes:
  docpipe_data:
