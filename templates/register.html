{% extends "base.html" %}
{% block title %}Register — Docpipe{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4 mt-3">
      <h1 class="display-6 fw-bold">
        <i class="bi bi-file-earmark-arrow-right-fill text-primary"></i> Docpipe
      </h1>
      <p class="text-muted">Create a new account</p>
    </div>

    {% if error %}
    <div class="alert alert-danger">
      <i class="bi bi-exclamation-triangle"></i> {{ error }}
    </div>
    {% endif %}

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h5 class="card-title mb-3">Register</h5>
        <form method="post" action="/register">
          <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input class="form-control" type="text" id="username" name="username"
                   minlength="3" required autofocus />
          </div>
          <div class="mb-3">
            <label class="form-label" for="email">Email <span class="text-muted">(optional)</span></label>
            <input class="form-control" type="email" id="email" name="email" />
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password"
                   minlength="6" required />
          </div>
          <div class="d-grid">
            <button class="btn btn-success" type="submit">
              <i class="bi bi-person-plus"></i> Create Account
            </button>
          </div>
        </form>
      </div>
    </div>

    <p class="text-center mt-3 text-muted">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
